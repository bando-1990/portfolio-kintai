services:
  postgres:
    image: postgres:15
    container_name: kintai-postgres
    environment:
      POSTGRES_DB: kintai
      POSTGRES_USER: kintai
      POSTGRES_PASSWORD: kintai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kintai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
